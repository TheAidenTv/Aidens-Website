<!DOCTYPE html>
<html data-bs-theme="light" lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Decision Maker | Aiden's Website</title>
    <meta name="description" content="Get a quick yes, no, or maybe answer with Aiden's decision maker.">
    <link rel="apple-touch-icon" type="image/png" sizes="180x180" href="../assets/img/Profile%20Pics/Profile180.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/img/Profile%20Pics/Profile16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/img/Profile%20Pics/Profile32.png">
    <link rel="stylesheet" href="../assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Montserrat:400,700&amp;display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato:400,700,400italic,700italic&amp;display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Space+Mono">
    <link rel="stylesheet" href="../assets/fonts/fontawesome-all.min.css">
    <link rel="stylesheet" href="../assets/fonts/font-awesome.min.css">
    <link rel="stylesheet" href="../assets/fonts/fontawesome5-overrides.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body id="page-top">
    <nav class="navbar navbar-expand-lg fixed-top bg-secondary text-uppercase navbar-light" id="mainNav" style="background:#2c3e50;">
        <div class="container"><a class="navbar-brand" href="../">Aidens Website</a><button data-bs-toggle="collapse" data-bs-target="#navbarResponsive" class="navbar-toggler text-uppercase text-white bg-primary navbar-toggler-right rounded" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation"><i class="fas fa-bars"></i></button>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item mx-0 mx-lg-1"><a class="nav-link py-3 px-0 px-lg-3 rounded" href="../">Home</a></li>
                    <li class="nav-item mx-0 mx-lg-1"><a class="nav-link py-3 px-0 px-lg-3 rounded" href="../#about">About</a></li>
                    <li class="nav-item mx-0 mx-lg-1"><a class="nav-link py-3 px-0 px-lg-3 rounded" href="../projects/">Projects</a></li>
                    <li class="nav-item mx-0 mx-lg-1"><a class="nav-link py-3 px-0 px-lg-3 rounded active" href="./">Decision Maker</a></li>
                    <li class="nav-item mx-0 mx-lg-1"><a class="nav-link py-3 px-0 px-lg-3 rounded" href="../snake/">Snake</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <main class="decision-page">
        <section class="decision-hero">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-10 col-xl-9">
                        <section class="answer-panel" aria-labelledby="answer-title">
                            <div class="answer-panel__header">
                                <div>
                                    <p class="answer-panel__label">Current Result</p>
                                    <h2 id="answer-title">Your answer is in</h2>
                                </div>
                                <span class="status-pill" id="status-pill">Loading</span>
                            </div>
                            <div class="answer-panel__body">
                                <div class="answer-copy">
                                    <p class="answer-copy__intro">Randomized answer</p>
                                    <p class="answer-copy__value" id="answer" aria-live="polite">Loading...</p>
                                    <p class="answer-copy__timestamp" id="updated-at">Just getting started.</p>
                                </div>
                                <div class="gif-card is-loading" id="gif-frame">
                                    <div class="gif-placeholder" id="gif-placeholder">Consulting the oracle...</div>
                                    <img id="gif" src="" alt="" loading="lazy" hidden>
                                </div>
                            </div>
                            <div class="answer-panel__footer">
                                <button class="btn btn-primary btn-xl" id="refresh-button" type="button">
                                    <i class="fas fa-sync-alt me-2"></i><span id="refresh-label">Get a New Answer</span>
                                </button>
                            </div>
                        </section>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="../assets/bootstrap/js/bootstrap.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
